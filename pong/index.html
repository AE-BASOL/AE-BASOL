<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Ahmet Efe Başol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            color: #f3f4f6;
            font-weight: 600;
        }
        canvas {
            background-color: #1f2937;
            border: 2px solid #374151;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            display: block;
        }
        .controls {
            margin-top: 20px;
            color: #9ca3af;
            font-size: 15px;
        }
        .controls kbd {
            background-color: #374151;
            border-radius: 4px;
            padding: 2px 6px;
            color: #f3f4f6;
            font-family: monospace;
            font-size: 14px;
        }
        .back-link {
            margin-top: 30px;
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 800px;
            max-width: 90%;
            padding: 0 40px;
            margin-bottom: 15px;
            font-size: 42px;
            font-weight: 700;
            color: #e5e7eb;
            box-sizing: border-box;
            font-variant-numeric: tabular-nums;
        }
        #playerScore {
            color: #60a5fa;
        }
        #aiScore {
            color: #f87171;
        }
    </style>
</head>
<body>

    <h1>Creative Engineering - Pong</h1>
    <div class="score-board">
        <span id="playerScore">0</span>
        <span id="aiScore">0</span>
    </div>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        Use <kbd>W</kbd> and <kbd>S</kbd> or <kbd>↑</kbd> <kbd>↓</kbd> arrows to move
    </div>
    
    <a href="https://github.com/AE-BASOL" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Profile
    </a>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const playerScoreElem = document.getElementById("playerScore");
        const aiScoreElem = document.getElementById("aiScore");

        // Game objects
        const paddleWidth = 12, paddleHeight = 85;
        const player = { x: 15, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "#60a5fa", dy: 0, score: 0 };
        const ai = { x: canvas.width - 27, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: "#f87171", dy: 4, score: 0 };
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 6, dx: 6, dy: 6, color: "#ffffff" };

        // Key controls
        let upPressed = false;
        let downPressed = false;

        document.addEventListener("keydown", keyDownHandler);
        document.addEventListener("keyup", keyUpHandler);

        function keyDownHandler(e) {
            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") { upPressed = true; e.preventDefault(); }
            else if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") { downPressed = true; e.preventDefault(); }
        }

        function keyUpHandler(e) {
            if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") upPressed = false;
            else if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") downPressed = false;
        }

        function drawRect(x, y, w, h, color, radius = 4) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fill();
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 30) {
                drawRect(canvas.width / 2 - 2, i, 4, 15, "#4b5563", 2);
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 6;
            ball.dx = -Math.sign(ball.dx) * 6;
            ball.dy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 3 + 3);
        }

        function update() {
            // Move player paddle
            if (upPressed && player.y > 0) player.y -= 8;
            else if (downPressed && player.y < canvas.height - player.height) player.y += 8;

            // Move AI paddle (smooth follow)
            let aiTarget = ball.y - ai.height / 2;
            ai.y += (aiTarget - ai.y) * 0.09;

            // Constrain AI
            if(ai.y < 0) ai.y = 0;
            if(ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Collision with top and bottom walls
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
                // Keep within bounds after bounce
                if (ball.y - ball.radius < 0) ball.y = ball.radius;
                if (ball.y + ball.radius > canvas.height) ball.y = canvas.height - ball.radius;
            }

            // Check collision with paddles
            let p = (ball.x < canvas.width / 2) ? player : ai;

            if (ball.x - ball.radius < p.x + p.width && 
                ball.x + ball.radius > p.x && 
                ball.y + ball.radius > p.y && 
                ball.y - ball.radius < p.y + p.height) {
                
                // Calculate hit point
                let collidePoint = ball.y - (p.y + p.height / 2);
                collidePoint = collidePoint / (p.height / 2);

                // Max angle 45 degrees (PI/4)
                let angleRad = collidePoint * (Math.PI / 4);

                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.dx = direction * ball.speed * Math.cos(angleRad);
                ball.dy = ball.speed * Math.sin(angleRad);

                // Increase speed safely
                if(ball.speed < 16) ball.speed += 0.4;
                
                // Nudge ball out of paddle to prevent sticking
                if (direction === 1) {
                    ball.x = p.x + p.width + ball.radius;
                } else {
                    ball.x = p.x - ball.radius;
                }
            }

            // Update score
            if (ball.x - ball.radius < -20) {
                ai.score++;
                aiScoreElem.innerText = ai.score;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width + 20) {
                player.score++;
                playerScoreElem.innerText = player.score;
                resetBall();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawNet();
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        resetBall();
        gameLoop();
    </script>
</body>
</html>
